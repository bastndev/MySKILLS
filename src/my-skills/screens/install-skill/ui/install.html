<div class="install-surface">

	<div class="install-header">
		<label class="install-search-box" for="install-search-input">
			<svg class="install-search-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
				<circle cx="6.5" cy="6.5" r="4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
				<path d="M10 10L13.5 13.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
			</svg>
			<input
				id="install-search-input"
				class="install-search-input"
				type="search"
				placeholder="Search skills..."
				autocomplete="off"
				spellcheck="false"
				aria-label="Search available skills"
			>
		</label>

		<div class="install-filters" role="tablist" aria-label="Filter skills">
			<button id="install-filter-all" class="install-filter active" type="button" role="tab" aria-selected="true" data-filter="all" aria-controls="install-panel-all">
				All Time
			</button>
			<button id="install-filter-trending" class="install-filter" type="button" role="tab" aria-selected="false" data-filter="trending" aria-controls="install-panel-trending">
				Trending <span class="install-filter-badge">24h</span>
			</button>
			<button id="install-filter-official" class="install-filter" type="button" role="tab" aria-selected="false" data-filter="official" aria-controls="install-panel-official">
				@ Official
			</button>
		</div>
	</div>

	<div id="install-panel-all" class="install-panel" role="tabpanel" aria-labelledby="install-filter-all">
		<!-- ALLTIME_PANEL -->
	</div>

	<div id="install-panel-trending" class="install-panel" role="tabpanel" aria-labelledby="install-filter-trending" aria-hidden="true" hidden>
		<!-- TRENDING_PANEL -->
	</div>

	<div id="install-panel-official" class="install-panel install-panel--official" role="tabpanel" aria-labelledby="install-filter-official" aria-hidden="true" hidden>
		<!-- OFFICIAL_PANEL -->
	</div>

	<div id="install-panel-search" class="install-panel" role="tabpanel" aria-hidden="true" hidden>
		<!-- SEARCH_PANEL -->
	</div>

</div>
